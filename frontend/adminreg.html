<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Registration</title>
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  <a href="register.html" class="back-arrow">←</a>

  <div class="auth-container">


<div class="left-panel">
  <div class="image-frame">
    <img src="images/register.jpg" alt="Admin Image">
  </div>
</div>

<div class="right-panel">
  <form id="adminForm">

    <h1 class="form-heading">Start Organising!</h1>

    <input type="text" id="organizationName" placeholder="Organization Name" required>
    
    <input type="text" id="intention" placeholder="Intention" required>
    
    <input type="text" id="location" placeholder="Location" required>

    <button type="submit">Finish Up!</button>

  </form>
</div>
<script src="js/adminreg.js"></script>
</body>
</html>
