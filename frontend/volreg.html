<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Registration</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <a href="register.html" class="back-arrow">←</a>

  <div class="auth-container">

    <div class="left-panel">
  <div class="image-frame">
    <img src="images/register.jpg" alt="Volunteer Image">
  </div>
</div>

<div class="right-panel">
  <form id="volunteerForm">

    <h1 class="form-heading">Start Volunteering!</h1>

    <select id="skills" required>
      <option value="" disabled selected>Skills</option>
      <option>Medical</option>
      <option>Logistics</option>
      <option>Teaching</option>
      <option>Nurturing</option>
    </select>

    <input type="text" id="location" placeholder="City, State" required>

    <label class="date-label">Availability</label>

    <div class="date-range">
      <input type="date" id="startDate" required>
      <input type="date" id="endDate" required>
    </div>

    <button type="submit">Finish Up!</button>

</form>
</div>
<script src="volreg.js"></script>
</body>
</html>
