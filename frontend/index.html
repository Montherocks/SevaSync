<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevaSync</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <!-- TOP LEFT LOGO -->
        <div class="logo">
            ❤️‍🩹 <span>SevaSync</span>
        </div>

        <!-- TOP RIGHT GET STARTED -->
        <button class="theme-btn" onclick="window.location.href='register.html'">
            Get Started
        </button>

    </header>

    <!-- HERO SECTION -->
    <section class="hero">

        <!-- LEFT CONTENT -->
        <div class="left">

            <h1>
                Come forth,<br>
                <span>make a change.</span>
            </h1>

            <p>
                SevaSync connects communities with the right volunteers
                and resources to create a better tomorrow, together.
            </p>

            <!-- MAIN BUTTONS -->
            <div class="buttons">

                <!-- GET STARTED -->
                <button class="btn primary"
                    onclick="window.location.href='register.html'">
                    Get Started
                </button>

                <!-- LOGIN -->
                <button class="btn secondary"
                    onclick="window.location.href='login.html'">
                    Login
                </button>

            </div>

        </div>

        <!-- RIGHT IMAGE -->
        <div class="right">
            <div class="image-wrapper">
                <img src="images/index.png" alt="Hero Image">
            </div>
        </div>

    </section>

</body>
</html>
